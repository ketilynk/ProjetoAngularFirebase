<ion-content [fullscreen]="true">
   
    <ion-grid>
        <ion-row>
            <ion-col size="6" class="image-col">  <img src="https://i.pinimg.com/736x/63/53/22/6353228ee5f621dfa9fa68b2bd7da866.jpg" alt=""></ion-col>




            <ion-col size="6" class="form-col">

                <div class="form-conteiner">
  
  
    <ion-label>Criar Conta</ion-label>

  
  <ion-item>
    <ion-input placeholder="Nome"></ion-input>
  </ion-item>

  <ion-item>
    <ion-input type="email" placeholder="E-mail"></ion-input>
  </ion-item>

  <ion-item>
    <ion-input type="password" placeholder="Senha"></ion-input>
  </ion-item>

  <ion-item>
    <ion-input type="password" placeholder="Confirmar Senha"></ion-input>
  </ion-item>

 
  <ion-button expand="block">
    Criar Conta
  </ion-button>

<ion-label>Login com</ion-label>

  <!-- Botões sociais -->
  <ion-button expand="block" color="primary">
    Facebook
  </ion-button>

  <ion-button expand="block" color="tertiary">
    Twitter
  </ion-button>

  <ion-button expand="block" color="danger">
    Google
  </ion-button>

</div>

                
            </ion-col>
            
        </ion-row>
    </ion-grid>
    
</ion-content>
